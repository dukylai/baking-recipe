<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>烘焙系統完整版</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    body{font-family:sans-serif;padding:20px}
    input,select{margin:4px}
    .box{border:1px solid #ccc;padding:10px;margin:10px 0}
  </style>
</head>
<body>

<h2>產品設定</h2>
<input id="productName" placeholder="產品名稱">
<input id="size" placeholder="尺寸(6吋)">

<h3>預熱</h3>
<input id="preheatTemp" placeholder="預熱溫度">
<input id="preheatTime" placeholder="預熱時間">

<h3>烘焙步驟</h3>
<button id="addStepBtn">新增步驟</button>
<div id="steps"></div>

<h3>材料</h3>
<button id="addIngredientBtn">新增材料</button>
<div id="ingredients"></div>

<h3>總成本: <span id="totalCost">0</span></h3>

<button id="saveBtn">💾 儲存產品</button>

<h3>產品列表</h3>
<div id="productList"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDrBhqAnD6j8sEGb0CLJKsoP4SRTTVVl0s",
  authDomain: "baking-system-e376c.firebaseapp.com",
  databaseURL: "https://baking-system-e376c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "baking-system-e376c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 材料資料庫
const materialDB = {
  "奶油乳酪": 0.056,
  "砂糖": 0.04,
  "鮮奶油": 0.026,
  "低筋麵粉": 0.07,
  "雞蛋": 10
};

// 材料
function addIngredient(name="", gram="", price="", note=""){
  const div=document.createElement("div");
  div.className="box";

  let options = `<option value="">選擇材料</option>`;
  Object.keys(materialDB).forEach(k=>{
    options += `<option value="${k}">${k}</option>`;
  });

  div.innerHTML=`
    材料:
    <select class="materialSelect">${options}</select>
    名稱:<input class="name" value="${name}">
    克數:<input class="gram" type="number" value="${gram}">
    單價:<input class="price" type="number" value="${price}">
    備註:<input class="note" value="${note}">
  `;

  div.querySelector(".materialSelect").onchange = function(){
    const selected = this.value;
    if(materialDB[selected]){
      div.querySelector(".name").value = selected;
      div.querySelector(".price").value = materialDB[selected];
    }
  }

  document.getElementById("ingredients").appendChild(div);
}

// 烘焙步驟
function addStep(temp="", time=""){
  const div=document.createElement("div");
  div.className="box";
  div.innerHTML=`溫度:<input class="stepTemp" value="${temp}"> 時間:<input class="stepTime" value="${time}">`;
  document.getElementById("steps").appendChild(div);
}

// 成本
function calculateCost(){
  let total=0;
  document.querySelectorAll("#ingredients .box").forEach(row=>{
    const g=parseFloat(row.querySelector(".gram").value)||0;
    const p=parseFloat(row.querySelector(".price").value)||0;
    total+=g*p;
  });
  document.getElementById("totalCost").innerText=total.toFixed(2);
}

// 儲存
function saveProduct(){
  const name=document.getElementById("productName").value;

  const data={
    name,
    size:document.getElementById("size").value,
    preheat:{
      temp:document.getElementById("preheatTemp").value,
      time:document.getElementById("preheatTime").value
    },
    steps:[],
    ingredients:[]
  };

  document.querySelectorAll("#steps .box").forEach(s=>{
    data.steps.push({
      temp:s.querySelector(".stepTemp").value,
      time:s.querySelector(".stepTime").value
    });
  });

  document.querySelectorAll("#ingredients .box").forEach(r=>{
    data.ingredients.push({
      name:r.querySelector(".name").value,
      gram:r.querySelector(".gram").value,
      price:r.querySelector(".price").value,
      note:r.querySelector(".note").value
    });
  });

  db.ref("products/"+name).set(data);
  alert("已儲存");
}

// 載入列表
function loadProducts(){
  db.ref("products").on("value",snap=>{
    const list=document.getElementById("productList");
    list.innerHTML="";
    const d=snap.val()||{};

    Object.keys(d).forEach(k=>{
      const div=document.createElement("div");
      div.className="box";
      div.innerHTML=`${k} <button onclick="loadOne('${k}')">載入</button>`;
      list.appendChild(div);
    });
  });
}

function loadOne(name){
  db.ref("products/"+name).once("value",snap=>{
    const d=snap.val();

    document.getElementById("productName").value=d.name;
    document.getElementById("size").value=d.size;
    document.getElementById("preheatTemp").value=d.preheat.temp;
    document.getElementById("preheatTime").value=d.preheat.time;

    document.getElementById("steps").innerHTML="";
    d.steps.forEach(s=>addStep(s.temp,s.time));

    document.getElementById("ingredients").innerHTML="";
    d.ingredients.forEach(i=>addIngredient(i.name,i.gram,i.price,i.note));

    calculateCost();
  });
}

// 綁定

document.getElementById("addIngredientBtn").onclick=()=>addIngredient();
document.getElementById("addStepBtn").onclick=()=>addStep();
document.getElementById("saveBtn").onclick=saveProduct;

setInterval(calculateCost,1000);
loadProducts();

</script>
</body>
</html>
