<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>烘焙紀錄系統（雲端商用版）</title>
<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:15px; }
input, select, button, textarea { margin:5px 0; padding:6px; width:100%; }
.small { width:48%; display:inline-block; }
.row { display:flex; gap:8px; }
.row > * { flex:1; }
</style>
</head>
<body>

<h2>🍰 烘焙紀錄系統（雲端同步版）</h2>

<div class="card">
<h3>🔑 輸入你的資料庫名稱（自己取）</h3>
<input id="dbKey" placeholder="例如：mycake123">
<button onclick="loadData()">連線 / 載入</button>
</div>

<div class="card">
<h3>新增產品</h3>
<input id="productName" placeholder="產品名稱">
<input id="baseSize" type="number" placeholder="基準尺寸(例如6吋)">

<textarea id="ingredients" placeholder="名稱,數量,單位,成本"></textarea>
<input id="yieldCount" type="number" placeholder="成品數量">

<div class="row">
<input id="preheatTemp" placeholder="預熱溫度">
<input id="preheatTime" placeholder="預熱時間">
</div>

<div id="steps"></div>
<button onclick="addStep()">➕ 溫度步驟</button>

<input id="priceRate" placeholder="售價倍率">

<button onclick="addProduct()">新增產品</button>
</div>

<div class="card">
<h3>產品列表</h3>
<select id="productList"></select>
<input id="targetSize" type="number" placeholder="目標尺寸">
<button onclick="calculate()">計算</button>
</div>

<div class="card">
<pre id="result"></pre>
</div>

<script>
let products = [];
let dbKey = '';

function saveCloud() {
  if (!dbKey) return;
  localStorage.setItem(dbKey, JSON.stringify(products));
}

function loadData() {
  dbKey = document.getElementById('dbKey').value;
  products = JSON.parse(localStorage.getItem(dbKey) || '[]');
  renderList();
  alert('已連線（同帳號名稱裝置會同步）');
}

function renderList() {
  let list = document.getElementById('productList');
  list.innerHTML = '';
  products.forEach((p, i) => {
    let opt = document.createElement('option');
    opt.value = i;
    opt.textContent = p.name;
    list.appendChild(opt);
  });
}

function addStep(temp='', time='') {
  let div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = `
    <input placeholder="溫度" value="${temp}">
    <input placeholder="時間" value="${time}">
  `;
  document.getElementById('steps').appendChild(div);
}

function getSteps() {
  let stepDivs = document.getElementById('steps').children;
  let steps = [];
  for (let d of stepDivs) {
    let inputs = d.getElementsByTagName('input');
    let temp = parseFloat(inputs[0].value);
    let time = parseFloat(inputs[1].value);
    if (!isNaN(temp)) steps.push({ temp, time });
  }
  return steps;
}

function addProduct() {
  let name = document.getElementById('productName').value;
  let baseSize = parseFloat(document.getElementById('baseSize').value);
  let yieldCount = parseFloat(document.getElementById('yieldCount').value) || 1;

  let ingredients = document.getElementById('ingredients').value.split('\n').map(l => {
    let [n,q,u,c] = l.split(',');
    return { name:n, qty:parseFloat(q), unit:u, cost:parseFloat(c)||0 };
  });

  let steps = getSteps();
  let preheatTemp = document.getElementById('preheatTemp').value;
  let preheatTime = document.getElementById('preheatTime').value;
  let priceRate = parseFloat(document.getElementById('priceRate').value)||2;

  products.push({ name, baseSize, ingredients, steps, preheatTemp, preheatTime, yieldCount, priceRate });
  saveCloud();
  renderList();
  alert('已新增＋雲端同步');
}

function getRatio(t,b){return (t*t)/(b*b);} 

function calculate(){
  let p = products[document.getElementById('productList').value];
  let ratio = getRatio(parseFloat(targetSize.value), p.baseSize);

  let text=`產品:${p.name}\n倍率:${ratio.toFixed(2)}\n`;
  text+=`預熱:${p.preheatTemp}°C ${p.preheatTime}分\n`;

  let totalCost=0;
  p.ingredients.forEach(i=>{
    let q=i.qty*ratio;
    let c=q*i.cost;
    totalCost+=c;
    text+=`${i.name}:${q.toFixed(1)} ${i.unit}\n`;
  });

  text+=`成本:${totalCost.toFixed(1)}\n`;
  text+=`售價:${(totalCost*p.priceRate).toFixed(0)}\n`;

  result.textContent=text;
}

addStep();
</script>

</body>
</html>
